[package]
name = "dashboard"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
axum = { workspace = true, features = [
  "query",
  "tokio",
  "http2",
  "json",
  "macros",
], default-features = true }
dotenvy = { workspace = true }
oauth2 = { workspace = true, features = ["reqwest"] }
leptos = { version = "*" }
reqwest = { workspace = true }
serde = { workspace = true, features = ["derive"] }
sha2 = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true, features = [
  "postgres",
  "runtime-tokio",
  "tls-rustls-aws-lc-rs",
] }
tokio = { workspace = true, features = ["rt-multi-thread"] }
tower-cookies = { workspace = true, features = ["axum-core"] }
tower-http = { workspace = true, features = ["cors", "fs"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["ansi", "fmt"] }
zayden-app = { workspace = true }
