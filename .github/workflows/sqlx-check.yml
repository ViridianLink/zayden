name: SQLx offline cache

# Fails if the committed `.sqlx` query cache is out of date, so a stale cache is
# caught here instead of at `docker build` time (where SQLX_OFFLINE=true relies
# on it). Runs an ephemeral Postgres + migrations — never touches the live DB.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-bookworm
        env:
          POSTGRES_USER: zayden
          POSTGRES_PASSWORD: zayden
          POSTGRES_DB: zayden
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zayden -d zayden"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://zayden:zayden@localhost:5432/zayden

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version 0.9.0 --no-default-features --features rustls,postgres --locked

      - name: Run migrations
        run: sqlx migrate run

      - name: Verify .sqlx cache is up to date
        run: cargo sqlx prepare --workspace --check -- --features ssr
